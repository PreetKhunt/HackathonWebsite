<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avengers: Doomsday</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('avengers_doomsday__doctor_doom_by_owesalfantazi_dhvi8q2-pre.jpg') no-repeat center center/cover;
            color: #00ff00;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px #00ff00;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            text-shadow: 0 0 10px #00ff00;
        }
        .button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-shadow: none;
        }
        .button:hover {
            background: #008000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Avengers: Doomsday</h1>
        <p>The end is near. Doctor Doom has arrived, and the fate of the universe is in peril.</p>
        <button class="button">Join the Battle</button>
    </div>
</body>
</html>
