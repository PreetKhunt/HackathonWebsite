<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Jharkhand Tourism</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #f5f5f5; padding: 2rem; }
        .payment-container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .payment-header { text-align: center; margin-bottom: 2rem; }
        .booking-summary { background: #f8f9fa; padding: 1rem; border-radius: 5px; margin-bottom: 2rem; }
        .total-amount { font-size: 1.5rem; font-weight: bold; color: #333; text-align: center; margin: 1rem 0; }
        .btn { padding: 0.75rem 1.5rem; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; width: 100%; margin: 0.5rem 0; }
        .btn:hover { background: #5a6fd8; }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <h1>Complete Your Payment</h1>
            <p>Secure payment for your Jharkhand Tourism package</p>
        </div>
        
        <div class="booking-summary">
            <h3>Booking Summary</h3>
            <div id="booking-details"></div>
            <div class="total-amount">Total: ₹<span id="total-amount">0</span></div>
        </div>
        
        <button class="btn" onclick="processPayment()">Pay Now with Razorpay</button>
        <button class="btn" onclick="alert('Payment successful! Booking confirmed.')">Pay with Stripe</button>
        
        <div style="text-align: center; margin-top: 1rem;">
            <a href="/" style="color: #667eea;">← Back to Home</a>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        // Load booking details from URL params
        function loadBookingDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const packageType = urlParams.get('package') || 'standard';
            const amount = urlParams.get('amount') || '10000';
            
            document.getElementById('total-amount').textContent = amount;
            document.getElementById('booking-details').innerHTML = `
                <p><strong>Package:</strong> ${packageType.charAt(0).toUpperCase() + packageType.slice(1)} Package</p>
                <p><strong>Amount:</strong> ₹${amount}</p>
            `;
        }
        
        function processPayment() {
            const amount = document.getElementById('total-amount').textContent;
            var options = {
                "key": "rzp_test_YOUR_KEY_HERE", // Enter the Key ID generated from the Dashboard
                "amount": parseInt(amount) * 100, // Amount is in currency subunits (paise)
                "currency": "INR",
                "name": "Jharkhand Tourism",
                "description": "Package Booking Transaction",
                "image": "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=100",
                "handler": function (response){
                    alert('Payment successful! Your Payment ID: ' + response.razorpay_payment_id + '\nYour booking has been confirmed. You will receive confirmation details via email.');
                    setTimeout(() => window.location.href = '/', 2000);
                },
                "prefill": {
                    "name": "Guest User",
                    "email": "guest@example.com",
                    "contact": "9999999999"
                },
                "theme": {
                    "color": "#667eea"
                }
            };
            var rzp1 = new Razorpay(options);
            
            rzp1.on('payment.failed', function (response){
                    alert("Payment Failed! Reason: " + response.error.description);
            });
            
            rzp1.open();
        }
        
        // Load booking details on page load
        loadBookingDetails();
    </script>
</body>
</html>
